name: 6529bot Spend Alerts

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  id-token: write

jobs:
  spend-alerts:
    if: ${{ vars.REVIEWBOT_ALERTS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bot
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Configure AWS credentials
        if: ${{ vars.REVIEW_USAGE_AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ vars.REVIEW_USAGE_AWS_REGION }}
          role-to-assume: ${{ vars.REVIEW_USAGE_AWS_ROLE_ARN }}

      - name: Install bot dependencies
        run: npm ci

      - name: Run spend alert check
        env:
          REVIEWBOT_ALERTS_ENABLED: true
          REVIEWBOT_ALERTS_NOTIFY_MODE: ${{ vars.REVIEWBOT_ALERTS_NOTIFY_MODE || 'sns' }}
          REVIEWBOT_ALERTS_SNS_TOPIC_ARN: ${{ vars.REVIEWBOT_ALERTS_SNS_TOPIC_ARN }}
          REVIEWBOT_ALERTS_WEBHOOK_URL: ${{ secrets.REVIEWBOT_ALERTS_WEBHOOK_URL }}
          REVIEWBOT_ALERTS_BUDGET_WARNING_PERCENT: ${{ vars.REVIEWBOT_ALERTS_BUDGET_WARNING_PERCENT || '80' }}
          REVIEWBOT_ALERTS_BUDGET_CRITICAL_PERCENT: ${{ vars.REVIEWBOT_ALERTS_BUDGET_CRITICAL_PERCENT || '100' }}
          REVIEWBOT_ALERTS_SPIKE_WINDOW_HOURS: ${{ vars.REVIEWBOT_ALERTS_SPIKE_WINDOW_HOURS || '24' }}
          REVIEWBOT_ALERTS_SPIKE_BASELINE_DAYS: ${{ vars.REVIEWBOT_ALERTS_SPIKE_BASELINE_DAYS || '7' }}
          REVIEWBOT_ALERTS_SPIKE_MULTIPLIER: ${{ vars.REVIEWBOT_ALERTS_SPIKE_MULTIPLIER || '3' }}
          REVIEWBOT_ALERTS_SPIKE_MIN_USD: ${{ vars.REVIEWBOT_ALERTS_SPIKE_MIN_USD || '25' }}
          REVIEW_USAGE_ENABLED: true
          REVIEW_USAGE_AWS_REGION: ${{ vars.REVIEW_USAGE_AWS_REGION }}
          REVIEW_USAGE_DB_RESOURCE_ARN: ${{ vars.REVIEW_USAGE_DB_RESOURCE_ARN }}
          REVIEW_USAGE_DB_SECRET_ARN: ${{ vars.REVIEW_USAGE_DB_SECRET_ARN }}
          REVIEW_USAGE_DB_NAME: ${{ vars.REVIEW_USAGE_DB_NAME }}
          REVIEW_USAGE_DB_SCHEMA: ${{ vars.REVIEW_USAGE_DB_SCHEMA }}
        run: npm run alerts:spend
