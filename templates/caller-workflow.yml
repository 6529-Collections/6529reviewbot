name: 6529bot Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  review:
    # This template documents the intended caller shape. The reusable workflow
    # will be finalized after the bot repo's first release tag.
    uses: 6529-Collections/6529reviewbot/.github/workflows/review.yml@v0
    with:
      pr_number: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
      head_sha: ${{ github.event.pull_request.head.sha || '' }}
      event_action: ${{ github.event.action || 'manual' }}
    secrets: inherit
