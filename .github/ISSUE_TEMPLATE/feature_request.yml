name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, provider keys, AWS credentials, private PR data, or non-public roadmap details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and cost considerations
      description: Any trust-boundary, provider-spend, or AWS implications?
