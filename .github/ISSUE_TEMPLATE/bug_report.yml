name: Bug report
description: Report a reproducible problem with 6529reviewbot.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, provider keys, AWS credentials, or private PR data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include sanitized commands, settings, and logs if useful.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Review engine
        - GitHub workflow
        - Provider adapter
        - AWS usage ledger
        - Documentation
        - Other
    validations:
      required: true
